"""Root meta schema type"""
type MetaSchema {
  tables: [MetaTable!]!
}

"""Information about a database table"""
type MetaTable {
  name: String!
  schemaName: String!
  fields: [MetaField!]!
  indexes: [MetaIndex!]!
  constraints: MetaConstraints!
  foreignKeyConstraints: [MetaForeignKeyConstraint!]!
  primaryKeyConstraints: [MetaPrimaryKeyConstraint!]!
  uniqueConstraints: [MetaUniqueConstraint!]!
  relations: MetaRelations!
  inflection: MetaInflection!
  query: MetaQuery!
}

"""Information about a table field/column"""
type MetaField {
  name: String!
  type: MetaType!
  isNotNull: Boolean!
  hasDefault: Boolean!
  isPrimaryKey: Boolean!
  isForeignKey: Boolean!
  description: String
}

"""Information about a PostgreSQL type"""
type MetaType {
  pgType: String!
  gqlType: String!
  isArray: Boolean!
  isNotNull: Boolean
  hasDefault: Boolean
  subtype: String
}

"""Information about a database index"""
type MetaIndex {
  name: String!
  isUnique: Boolean!
  isPrimary: Boolean!
  columns: [String!]!
  fields: [MetaField!]
}

"""Table constraints"""
type MetaConstraints {
  primaryKey: MetaPrimaryKeyConstraint
  unique: [MetaUniqueConstraint!]!
  foreignKey: [MetaForeignKeyConstraint!]!
}

"""Information about a primary key constraint"""
type MetaPrimaryKeyConstraint {
  name: String!
  fields: [MetaField!]!
}

"""Information about a unique constraint"""
type MetaUniqueConstraint {
  name: String!
  fields: [MetaField!]!
}

"""Information about a foreign key constraint"""
type MetaForeignKeyConstraint {
  name: String!
  fields: [MetaField!]!
  referencedTable: String!
  referencedFields: [String!]!
  refFields: [MetaField!]
  refTable: MetaRefTable
}

"""Reference to a related table"""
type MetaRefTable {
  name: String!
}

"""Table relations"""
type MetaRelations {
  belongsTo: [MetaBelongsToRelation!]!
  has: [MetaHasRelation!]!
  hasOne: [MetaHasRelation!]!
  hasMany: [MetaHasRelation!]!
  manyToMany: [MetaManyToManyRelation!]!
}

"""A belongs-to (forward FK) relation"""
type MetaBelongsToRelation {
  fieldName: String
  isUnique: Boolean!
  type: String
  keys: [MetaField!]!
  references: MetaRefTable!
}

"""A has-one or has-many (reverse FK) relation"""
type MetaHasRelation {
  fieldName: String
  isUnique: Boolean!
  type: String
  keys: [MetaField!]!
  referencedBy: MetaRefTable!
}

"""A many-to-many relation via junction table"""
type MetaManyToManyRelation {
  fieldName: String
  type: String
  junctionTable: MetaRefTable!
  junctionLeftConstraint: MetaForeignKeyConstraint!
  junctionLeftKeyAttributes: [MetaField!]!
  junctionRightConstraint: MetaForeignKeyConstraint!
  junctionRightKeyAttributes: [MetaField!]!
  leftKeyAttributes: [MetaField!]!
  rightKeyAttributes: [MetaField!]!
  rightTable: MetaRefTable!
}

"""Table inflection names"""
type MetaInflection {
  tableType: String!
  allRows: String!
  connection: String!
  edge: String!
  filterType: String
  orderByType: String!
  conditionType: String!
  patchType: String
  createInputType: String!
  createPayloadType: String!
  updatePayloadType: String
  deletePayloadType: String!
}

"""Table query/mutation names"""
type MetaQuery {
  all: String!
  one: String
  create: String
  update: String
  delete: String
}

input RequestUploadUrlInput {
  """Bucket key (e.g., "public", "private")"""
  bucketKey: String!

  """
  Owner entity ID for entity-scoped uploads.
  Omit for app-level (database-wide) storage.
  When provided, resolves the storage module for the entity type
  that owns this entity instance (e.g., a data room ID, team ID).
  """
  ownerId: UUID

  """SHA-256 content hash computed by the client (hex-encoded, 64 chars)"""
  contentHash: String!

  """MIME type of the file (e.g., "image/png")"""
  contentType: String!

  """File size in bytes"""
  size: Int!

  """Original filename (optional, for display and Content-Disposition)"""
  filename: String
}

"""
A universally unique identifier as defined by [RFC 4122](https://tools.ietf.org/html/rfc4122).
"""
scalar UUID

type RequestUploadUrlPayload {
  """Presigned PUT URL (null if file was deduplicated)"""
  uploadUrl: String

  """The file ID (existing if deduplicated, new if fresh upload)"""
  fileId: UUID!

  """The S3 object key"""
  key: String!

  """Whether this file was deduplicated (already exists with same hash)"""
  deduplicated: Boolean!

  """Presigned URL expiry time (null if deduplicated)"""
  expiresAt: Datetime

  """
  File status — 'pending' for fresh uploads, 'ready' or 'processed' for deduplicated files. Clients can use this to know immediately whether the file is usable.
  """
  status: String!
}

"""
A point in time as described by the [ISO
8601](https://en.wikipedia.org/wiki/ISO_8601) and, if it has a timezone, [RFC
3339](https://datatracker.ietf.org/doc/html/rfc3339) standards. Input values
that do not conform to both ISO 8601 and RFC 3339 may be coerced, which may lead
to unexpected results.
"""
scalar Datetime

input ConfirmUploadInput {
  """The file ID returned by requestUploadUrl"""
  fileId: UUID!
}

type ConfirmUploadPayload {
  """The confirmed file ID"""
  fileId: UUID!

  """New file status"""
  status: String!

  """Whether confirmation succeeded"""
  success: Boolean!
}

"""The root query type which gives access points into the data universe."""
type Query {
  """
  Metadata about the database schema, including tables, fields, indexes, and constraints. Useful for code generation tools.
  """
  _meta: MetaSchema
}

"""
The root mutation type which contains root level fields which mutate data.
"""
type Mutation {
  """
  Request a presigned URL for uploading a file directly to S3.
  Client computes SHA-256 of the file content and provides it here.
  If a file with the same hash already exists (dedup), returns the
  existing file ID and deduplicated=true with no uploadUrl.
  """
  requestUploadUrl(
    """
    The exclusive input argument for this mutation. An object type, make sure to see documentation for this object’s fields.
    """
    input: RequestUploadUrlInput!
  ): RequestUploadUrlPayload

  """
  Confirm that a file has been uploaded to S3.
  Verifies the object exists in S3, checks content-type,
  and transitions the file status from 'pending' to 'ready'.
  """
  confirmUpload(
    """
    The exclusive input argument for this mutation. An object type, make sure to see documentation for this object’s fields.
    """
    input: ConfirmUploadInput!
  ): ConfirmUploadPayload

  """
  Provision an S3 bucket for a logical bucket in the database.
  Reads the bucket config via RLS, then creates and configures
  the S3 bucket with the appropriate privacy policies, CORS rules,
  and lifecycle settings.
  """
  provisionBucket(
    """
    The exclusive input argument for this mutation. An object type, make sure to see documentation for this object’s fields.
    """
    input: ProvisionBucketInput!
  ): ProvisionBucketPayload
}

input ProvisionBucketInput {
  """The logical bucket key (e.g., "public", "private")"""
  bucketKey: String!

  """
  Owner entity ID for entity-scoped bucket provisioning.
  Omit for app-level (database-wide) storage.
  """
  ownerId: UUID
}

type ProvisionBucketPayload {
  """Whether provisioning succeeded"""
  success: Boolean!

  """The S3 bucket name that was provisioned"""
  bucketName: String!

  """The access type applied"""
  accessType: String!

  """The storage provider used"""
  provider: String!

  """The S3 endpoint (null for AWS S3 default)"""
  endpoint: String

  """Error message if provisioning failed"""
  error: String
}